  <text x="32" y="40" text-anchor="middle"
        font-family="'Arial Narrow','Helvetica Neue',Arial,sans-serif"
        font-size="30" font-weight="700" letter-spacing="1" fill="#eef0f2">CT</text>
  <g fill="#f26722">
    <rect x="8" y="49" width="10" height="7" transform="skewX(-18)" transform-origin="8 49"/>
    <rect x="26" y="49" width="10" height="7" transform="skewX(-18)" transform-origin="26 49"/>
    <rect x="44" y="49" width="10" height="7" transform="skewX(-18)" transform-origin="44 49"/>
  </g>
